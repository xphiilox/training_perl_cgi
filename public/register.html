<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登録画面</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d9e0ea;
      --text: #172033;
      --muted: #667085;
      --primary: #1267d8;
      --ok: #138a43;
      --error: #b42318;
      --error-bg: #fff1f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 20px 28px;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    .subhead {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font: inherit;
      padding: 10px 12px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .field {
      margin-bottom: 18px;
    }

    .notice {
      border: 1px solid #b7e3c5;
      border-radius: 6px;
      background: #eaf8ef;
      color: var(--ok);
      margin: 0 0 18px;
      padding: 10px 12px;
    }

    .notice.error {
      border-color: #ffccc7;
      background: var(--error-bg);
      color: var(--error);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    button,
    .action-link {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      display: inline-block;
      font: inherit;
      padding: 10px 14px;
      text-decoration: none;
    }

    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
    }

    @media (max-width: 520px) {
      header,
      main {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>登録画面</h1>
    <p class="subhead">名前、血液型、住所を入力してください</p>
  </header>

  <main>
    <section class="panel">
      {{NOTICE}}
      <form method="post" action="/register.cgi">
        <div class="field">
          <label for="name">名前</label>
          <input id="name" name="name" type="text" autocomplete="name" value="{{NAME}}" required>
        </div>

        <div class="field">
          <label for="blood_type">血液型</label>
          <select id="blood_type" name="blood_type" required>
            <option value="">選択してください</option>
            <option value="A"{{SELECTED_A}}>A型</option>
            <option value="B"{{SELECTED_B}}>B型</option>
            <option value="O"{{SELECTED_O}}>O型</option>
            <option value="AB"{{SELECTED_AB}}>AB型</option>
          </select>
        </div>

        <div class="field">
          <label for="address">住所</label>
          <textarea id="address" name="address" autocomplete="street-address" required>{{ADDRESS}}</textarea>
        </div>

        <div class="actions">
          <button class="primary" type="submit">登録</button>
          <a class="action-link" href="/">ホームへ戻る</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
